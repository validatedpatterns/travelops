{{- if .Values.gateway.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: travelops-console-link
rules:
- apiGroups:
  - route.openshift.io
  resources:
  - routes
  verbs:
  - get
  - list
- apiGroups:
  - console.openshift.io
  resources:
  - consolelinks
  verbs:
  - get
  - create
  - update
  - patch
{{- end }}
